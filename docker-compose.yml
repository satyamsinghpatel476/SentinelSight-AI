services:
  app:
    build:
      context: .
      dockerfile: Dockerfile

    environment:
      APP_NAME: "SentinelSight AI"
      APP_ENV: "${APP_ENV:-development}"
      APP_SECRET_KEY: "${APP_SECRET_KEY:?APP_SECRET_KEY must be set}"

      DATABASE_URL: "postgresql+psycopg://sentinelsight:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/sentinelsight"

      ACCESS_TOKEN_EXPIRE_MINUTES: "${ACCESS_TOKEN_EXPIRE_MINUTES:-60}"
      COOKIE_SECURE: "${COOKIE_SECURE:-false}"
      COOKIE_SAMESITE: "${COOKIE_SAMESITE:-lax}"

      LOGIN_RATE_LIMIT_ATTEMPTS: "${LOGIN_RATE_LIMIT_ATTEMPTS:-5}"
      LOGIN_RATE_LIMIT_WINDOW_SECONDS: "${LOGIN_RATE_LIMIT_WINDOW_SECONDS:-300}"
      LOGIN_RATE_LIMIT_MAX_KEYS: "${LOGIN_RATE_LIMIT_MAX_KEYS:-10000}"
      MAX_REQUEST_BODY_BYTES: "${MAX_REQUEST_BODY_BYTES:-1048576}"

      AI_ENABLED: "${AI_ENABLED:-false}"
      AI_PROVIDER: "${AI_PROVIDER:-}"
      AI_MODEL: "${AI_MODEL:-}"
      AI_API_KEY: "${AI_API_KEY:-}"
      AI_TIMEOUT_SECONDS: "${AI_TIMEOUT_SECONDS:-20}"

      SCAN_CONNECT_TIMEOUT_SECONDS: "${SCAN_CONNECT_TIMEOUT_SECONDS:-5}"
      SCAN_READ_TIMEOUT_SECONDS: "${SCAN_READ_TIMEOUT_SECONDS:-10}"
      SCAN_TOTAL_TIMEOUT_SECONDS: "${SCAN_TOTAL_TIMEOUT_SECONDS:-20}"
      SCAN_MAX_RESPONSE_BYTES: "${SCAN_MAX_RESPONSE_BYTES:-5000000}"
      SCAN_MAX_REDIRECTS: "${SCAN_MAX_REDIRECTS:-3}"
      SCAN_MAX_CONCURRENT: "${SCAN_MAX_CONCURRENT:-3}"

      SCREENSHOT_TIMEOUT_MS: "${SCREENSHOT_TIMEOUT_MS:-15000}"
      SCREENSHOT_WIDTH: "${SCREENSHOT_WIDTH:-1365}"
      SCREENSHOT_HEIGHT: "${SCREENSHOT_HEIGHT:-768}"

      VISUAL_MINOR_THRESHOLD: "${VISUAL_MINOR_THRESHOLD:-5}"
      VISUAL_MODERATE_THRESHOLD: "${VISUAL_MODERATE_THRESHOLD:-15}"
      VISUAL_MAJOR_THRESHOLD: "${VISUAL_MAJOR_THRESHOLD:-35}"

      INCIDENT_RISK_THRESHOLD: "${INCIDENT_RISK_THRESHOLD:-50}"

      DEMO_ADMIN_EMAIL: "${DEMO_ADMIN_EMAIL:?DEMO_ADMIN_EMAIL must be set}"
      DEMO_ADMIN_PASSWORD: "${DEMO_ADMIN_PASSWORD:?DEMO_ADMIN_PASSWORD must be set}"

      DEMO_ANALYST_EMAIL: "${DEMO_ANALYST_EMAIL:?DEMO_ANALYST_EMAIL must be set}"
      DEMO_ANALYST_PASSWORD: "${DEMO_ANALYST_PASSWORD:?DEMO_ANALYST_PASSWORD must be set}"

      DEMO_VIEWER_EMAIL: "${DEMO_VIEWER_EMAIL:?DEMO_VIEWER_EMAIL must be set}"
      DEMO_VIEWER_PASSWORD: "${DEMO_VIEWER_PASSWORD:?DEMO_VIEWER_PASSWORD must be set}"

    ports:
      - "8000:8000"

    depends_on:
      postgres:
        condition: service_healthy

    volumes:
      - app_storage:/app/backend/storage

    restart: unless-stopped

  postgres:
    image: postgres:16-alpine

    environment:
      POSTGRES_DB: "sentinelsight"
      POSTGRES_USER: "sentinelsight"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}"

    ports:
      - "5432:5432"

    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U sentinelsight -d sentinelsight
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

    volumes:
      - postgres_data:/var/lib/postgresql/data

    restart: unless-stopped

  demo-target:
    build:
      context: ./demo-target
      dockerfile: Dockerfile

    environment:
      DEMO_TARGET_TOGGLE_SECRET: "${DEMO_TARGET_TOGGLE_SECRET:?DEMO_TARGET_TOGGLE_SECRET must be set}"

    ports:
      - "9000:9000"

    restart: unless-stopped

volumes:
  app_storage:
  postgres_data:
