services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      APP_NAME: SentinelSight AI
      APP_ENV: development
      APP_SECRET_KEY: ${APP_SECRET_KEY:?APP_SECRET_KEY must be set}
      DATABASE_URL: postgresql+psycopg://sentinelsight:${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}@postgres:5432/sentinelsight
      COOKIE_SECURE: "false"
      COOKIE_SAMESITE: lax
      AI_ENABLED: "false"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - app_storage:/app/backend/storage

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sentinelsight
      POSTGRES_USER: sentinelsight
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sentinelsight -d sentinelsight"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres_data:/var/lib/postgresql/data

  demo-target:
    build:
      context: ./demo-target
      dockerfile: Dockerfile
    environment:
      DEMO_TARGET_TOGGLE_SECRET: ${DEMO_TARGET_TOGGLE_SECRET:?DEMO_TARGET_TOGGLE_SECRET must be set}
    ports:
      - "9000:9000"

volumes:
  app_storage:
  postgres_data:
